repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=51200"] # model artifacts are committed (see docs/ML.md), up to ~50MB total
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff (backend)
        args: ["--fix", "--config=backend/pyproject.toml"]
        files: ^backend/
      - id: ruff
        name: ruff (ml)
        args: ["--fix", "--config=ml/pyproject.toml"]
        files: ^ml/
      - id: ruff
        name: ruff (libs/wattwise_tariffs)
        args: ["--fix", "--config=libs/wattwise_tariffs/pyproject.toml"]
        files: ^libs/wattwise_tariffs/
      - id: ruff
        name: ruff (libs/wattwise_climate)
        args: ["--fix", "--config=libs/wattwise_climate/pyproject.toml"]
        files: ^libs/wattwise_climate/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: black (backend)
        args: ["--config=backend/pyproject.toml"]
        files: ^backend/
      - id: black
        name: black (ml)
        args: ["--config=ml/pyproject.toml"]
        files: ^ml/
      - id: black
        name: black (libs/wattwise_tariffs)
        args: ["--config=libs/wattwise_tariffs/pyproject.toml"]
        files: ^libs/wattwise_tariffs/
      - id: black
        name: black (libs/wattwise_climate)
        args: ["--config=libs/wattwise_climate/pyproject.toml"]
        files: ^libs/wattwise_climate/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - fastapi==0.115.6
          - sqlalchemy==2.0.36
          - pydantic==2.10.4
          - pydantic-settings==2.7.1
          - pyjwt==2.10.1
          - passlib==1.7.4
          - structlog==24.4.0
          - sentry-sdk==2.19.2
          - slowapi==0.1.9
          - types-passlib==1.7.7.20241221
          - xgboost==2.1.3
        args: ["--config-file=backend/pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: mypy (ml)
        files: ^ml/(data|features|models|evaluation)/
        additional_dependencies:
          - pandas-stubs
          - numpy==2.2.1
        args: ["--config-file=ml/pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: mypy (libs/wattwise_tariffs)
        files: ^libs/wattwise_tariffs/wattwise_tariffs/
        additional_dependencies:
          - pandas-stubs
        args: ["--config-file=libs/wattwise_tariffs/pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: mypy (libs/wattwise_climate)
        files: ^libs/wattwise_climate/wattwise_climate/
        additional_dependencies:
          - pandas-stubs
        args: ["--config-file=libs/wattwise_climate/pyproject.toml"]

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
      - id: frontend-format
        name: frontend prettier
        entry: >-
          bash -c 'cd frontend && files=(); for f in "$@"; do
          files+=("${f#frontend/}"); done;
          node node_modules/prettier/bin/prettier.cjs --write "${files[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
